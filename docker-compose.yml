services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: rizu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: rizu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rizu -d rizu"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://rizu:${DB_PASSWORD}@db:5432/rizu"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: